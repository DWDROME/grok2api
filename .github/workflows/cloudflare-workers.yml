name: Deploy to Cloudflare Workers (B)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wrangler.toml"
      - "src/**"
      - "migrations/**"
      - "app/static/**"
      - ".github/workflows/cloudflare-workers.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

concurrency:
  group: deploy-cloudflare-workers-b
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Ensure D1 + KV and generate wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python -u - <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request

          token = os.environ.get("CLOUDFLARE_API_TOKEN", "")
          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "")
          build_sha = os.environ.get("GITHUB_SHA", "") or ""
          if not token or not account_id:
              raise SystemExit("Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID")

          src_path = "wrangler.toml"
          dst_path = "wrangler.ci.toml"
          wrangler_text = open(src_path, "r", encoding="utf-8").read()

          def extract(pattern: str, fallback: str) -> str:
              m = re.search(pattern, wrangler_text)
              return m.group(1).strip() if m and m.group(1).strip() else fallback

          worker_name = extract(r'(?m)^name\s*=\s*"([^"]+)"\s*$', "grok2api")
          kv_title = f"{worker_name}-cache"
          kv_base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces"

          def request(method: str, url: str, data=None):
              headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              body = None if data is None else json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def extract_routes(text: str):
              routes = []
              # 兼容 inline routes = [{ pattern = "...", zone_name = "..." }, ...]
              for m in re.finditer(r'pattern\s*=\s*"([^"]+)"\s*,\s*zone_name\s*=\s*"([^"]+)"', text):
                  routes.append((m.group(1).strip(), m.group(2).strip()))
              return routes

          def route_host_prefix(pattern: str) -> str:
              raw = pattern.strip()
              if "://" in raw:
                  raw = raw.split("://", 1)[1]
              slash = raw.find("/")
              if slash < 0:
                  return raw
              return raw[: slash + 1]

          kv_id = None
          page = 1
          while True:
              res = request("GET", f"{kv_base}?per_page=100&page={page}")
              if not res.get("success"):
                  raise RuntimeError(res)
              for item in res.get("result", []):
                  if item.get("title") == kv_title:
                      kv_id = item.get("id")
                      break
              if kv_id:
                  break
              info = res.get("result_info") or {}
              if page >= int(info.get("total_pages") or 1):
                  break
              page += 1
          if not kv_id:
              res = request("POST", kv_base, {"title": kv_title})
              if not res.get("success"):
                  raise RuntimeError(res)
              kv_id = res["result"]["id"]

          d1_name = extract(r'(?m)^database_name\s*=\s*"([^"]+)"\s*$', worker_name)
          d1_base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database"
          d1_id = None
          page = 1
          while True:
              res = request("GET", f"{d1_base}?per_page=100&page={page}")
              if not res.get("success"):
                  raise RuntimeError(res)
              for item in res.get("result", []):
                  if item.get("name") == d1_name:
                      d1_id = item.get("uuid") or item.get("id")
                      break
              if d1_id:
                  break
              info = res.get("result_info") or {}
              if page >= int(info.get("total_pages") or 1):
                  break
              page += 1
          if not d1_id:
              res = request("POST", d1_base, {"name": d1_name})
              if not res.get("success"):
                  raise RuntimeError(res)
              d1_id = res.get("result", {}).get("uuid") or res.get("result", {}).get("id")
              if not d1_id:
                  raise RuntimeError({"error": "Missing D1 database id", "response": res})

          text2 = wrangler_text
          text2 = re.sub(r'REPLACE_WITH_KV_NAMESPACE_ID', kv_id, text2)
          text2 = re.sub(r'REPLACE_WITH_D1_DATABASE_ID', d1_id, text2)
          text2 = re.sub(
              r'(?ms)(\[\[kv_namespaces\]\].*?^\s*id\s*=\s*")[^"]*("\s*)$',
              lambda m: f"{m.group(1)}{kv_id}{m.group(2)}",
              text2,
          )
          text2 = re.sub(
              r'(?ms)(\[\[d1_databases\]\].*?^\s*database_id\s*=\s*")[^"]*("\s*)$',
              lambda m: f"{m.group(1)}{d1_id}{m.group(2)}",
              text2,
          )
          if build_sha:
              if re.search(r'(?m)^BUILD_SHA\s*=', text2):
                  text2 = re.sub(r'(?m)^BUILD_SHA\s*=\s*"[^"]*"\s*$', f'BUILD_SHA = "{build_sha}"', text2)
              else:
                  text2 = re.sub(r'(?m)^\[vars\]\s*$', f'[vars]\nBUILD_SHA = "{build_sha}"', text2, count=1)
          open(dst_path, "w", encoding="utf-8").write(text2)

          # 自动清理与当前 worker_name 冲突的旧路由，避免 wrangler deploy 因 route 冲突失败
          route_pairs = extract_routes(text2)
          zone_cache = {}

          def get_zone_id(zone_name: str) -> str:
              zone_id = zone_cache.get(zone_name)
              if zone_id:
                  return zone_id
              encoded_name = urllib.parse.quote(zone_name, safe="")
              zres = request(
                  "GET",
                  f"https://api.cloudflare.com/client/v4/zones?name={encoded_name}&status=active&per_page=1",
              )
              if not zres.get("success") or not zres.get("result"):
                  raise RuntimeError({"error": f"Zone not found: {zone_name}", "response": zres})
              zone_id = zres["result"][0]["id"]
              zone_cache[zone_name] = zone_id
              return zone_id

          # 先按子域前缀清理冲突/遗留路由（包括 script 为空的 bypass 规则）
          prefixes_by_zone = {}
          desired_patterns_by_zone = {}
          for pattern, zone_name in route_pairs:
              host_prefix = route_host_prefix(pattern)
              if host_prefix:
                  prefixes_by_zone.setdefault(zone_name, set()).add(host_prefix)
              desired_patterns_by_zone.setdefault(zone_name, set()).add(pattern)

          for zone_name, prefixes in prefixes_by_zone.items():
              zone_id = get_zone_id(zone_name)
              desired_patterns = desired_patterns_by_zone.get(zone_name, set())
              page = 1
              while True:
                  rres = request(
                      "GET",
                      f"https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes?per_page=100&page={page}",
                  )
                  if not rres.get("success"):
                      raise RuntimeError(rres)
                  result = rres.get("result", [])
                  for item in result:
                      route_pattern = (item.get("pattern") or "").strip()
                      old_script = (item.get("script") or "").strip()
                      route_id = (item.get("id") or "").strip()
                      if not route_pattern or not route_id:
                          continue
                      if not any(route_pattern.startswith(prefix) for prefix in prefixes):
                          continue
                      if route_pattern in desired_patterns:
                          if old_script and old_script != worker_name:
                              dres = request(
                                  "DELETE",
                                  f"https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes/{route_id}",
                              )
                              if not dres.get("success"):
                                  raise RuntimeError(dres)
                              print(f"Removed conflicting desired route: {route_pattern} ({old_script} -> {worker_name})")
                          continue
                      dres = request(
                          "DELETE",
                          f"https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes/{route_id}",
                      )
                      if not dres.get("success"):
                          raise RuntimeError(dres)
                      print(
                          f"Removed stale route by host prefix: {route_pattern} "
                          f"(script: {old_script or 'none'} -> {worker_name})"
                      )
                  info = rres.get("result_info") or {}
                  if page >= int(info.get("total_pages") or 1):
                      break
                  page += 1

          for pattern, zone_name in route_pairs:
              zone_id = get_zone_id(zone_name)

              page = 1
              matched = False
              while True:
                  rres = request(
                      "GET",
                      f"https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes?per_page=100&page={page}",
                  )
                  if not rres.get("success"):
                      raise RuntimeError(rres)
                  result = rres.get("result", [])
                  for item in result:
                      if item.get("pattern") != pattern:
                          continue
                      matched = True
                      old_script = (item.get("script") or "").strip()
                      route_id = (item.get("id") or "").strip()
                      if old_script and old_script != worker_name and route_id:
                          dres = request(
                              "DELETE",
                              f"https://api.cloudflare.com/client/v4/zones/{zone_id}/workers/routes/{route_id}",
                          )
                          if not dres.get("success"):
                              raise RuntimeError(dres)
                          print(f"Removed conflicting route: {pattern} ({old_script} -> {worker_name})")
                      else:
                          print(f"Route ready: {pattern} (current: {old_script or 'none'})")
                  info = rres.get("result_info") or {}
                  if page >= int(info.get("total_pages") or 1):
                      break
                  page += 1
              if not matched:
                  print(f"Route not present yet, deploy will create: {pattern}")

          print(f"KV ready: {kv_title} ({kv_id})")
          print(f"D1 ready: {d1_name} ({d1_id})")
          print(f"Generated {dst_path}")
          PY

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
