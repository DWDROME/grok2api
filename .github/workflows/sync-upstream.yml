name: Sync Upstream Every 12h

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream/main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/chenyme/grok2api.git
          git fetch upstream main
          git checkout main
          before_sha="$(git rev-parse HEAD)"

          # 先尝试常规自动合并
          if git merge --no-commit --no-ff --allow-unrelated-histories upstream/main; then
            echo "Auto-merge succeeded without conflict."
          else
            echo "Merge conflict detected. Applying guarded conflict strategy..."
            conflict_files="$(git diff --name-only --diff-filter=U || true)"
            for f in ${conflict_files}; do
              case "$f" in
                .github/workflows/deploy-cloudflare-worker.yml|\
                .github/workflows/sync-upstream.yml|\
                cloudflare/worker/*|\
                docs/cloudflare-worker-deploy.md)
                  git checkout --ours -- "$f"
                  ;;
                *)
                  git checkout --theirs -- "$f"
                  ;;
              esac
              git add "$f"
            done
          fi

          if git diff --cached --quiet; then
            echo "No changes after sync, skip push."
            git merge --abort || true
            exit 0
          fi

          git commit -m "chore: sync from upstream/main (auto)"
          after_sha="$(git rev-parse HEAD)"
          echo "before=${before_sha}"
          echo "after=${after_sha}"
          git push origin main
